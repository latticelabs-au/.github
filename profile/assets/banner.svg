<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lattice Labs. Names are sacred.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C1E3C"/>
      <stop offset="0.55" stop-color="#10264A"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <pattern id="lattice" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1E3A5F" stroke-width="1"/>
    </pattern>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00B4D8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00B4D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00B4D8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00B4D8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00B4D8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="300" rx="16" fill="url(#lattice)" opacity="0.55"/>
  <ellipse cx="600" cy="150" rx="420" ry="170" fill="url(#halo)"/>

  <!-- travelling beam across the grid -->
  <rect x="-300" y="0" width="300" height="300" fill="url(#beam)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="1500 0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- constellation edges -->
  <g stroke="#00B4D8" stroke-width="1" opacity="0.35" stroke-dasharray="4 6">
    <line x1="144" y1="96" x2="288" y2="192">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="2.4s" repeatCount="indefinite"/>
    </line>
    <line x1="288" y1="192" x2="384" y2="96">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="816" y1="216" x2="960" y2="144">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <line x1="960" y1="144" x2="1056" y2="240">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="912" y1="60" x2="960" y2="144">
      <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="2.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- glowing lattice nodes -->
  <g>
    <circle cx="144" cy="96" r="3.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="288" cy="192" r="3" fill="#B8860B">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="384" cy="96" r="2.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="912" cy="60" r="2.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="816" cy="216" r="3" fill="#B8860B">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="2.6s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="144" r="3.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1056" cy="240" r="2.5" fill="#00B4D8">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.9s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="48" r="2" fill="#B8860B">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wordmark -->
  <text x="600" y="152" text-anchor="middle" font-family="'DM Sans','Segoe UI',Helvetica,Arial,sans-serif" font-size="62" font-weight="700" letter-spacing="10" fill="#FFFFFF">LATTICE LABS</text>

  <!-- marching underline -->
  <line x1="452" y1="176" x2="748" y2="176" stroke="#00B4D8" stroke-width="2" stroke-dasharray="6 8" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-56" dur="1.6s" repeatCount="indefinite"/>
  </line>

  <!-- tagline -->
  <text x="600" y="212" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="16" font-weight="500" letter-spacing="8" fill="#B8860B">NAMES ARE SACRED</text>
</svg>
